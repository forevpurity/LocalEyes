# Production-style stack: Caddy (TLS) -> Nginx client -> Node server -> PostGIS.
# Copy .env.docker.example to .env and fill in real secrets before `docker compose up -d`.
# The server crashes on boot (by design) if JWT secrets are weak/placeholder or
# CORS_ORIGIN is unset, since NODE_ENV=production here.
services:
  # Public front door: terminates TLS (auto Let's Encrypt) and forwards to client.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - client

  db:
    # PostGIS is preinstalled and the extension is auto-enabled on the default DB.
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-localeyes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localeyes}
      POSTGRES_DB: ${POSTGRES_DB:-localeyes}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-localeyes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      # Bound to the VPS's localhost only: NOT reachable from the internet.
      # To run `npm run db:push` / `db:seed` or use pgAdmin from your laptop,
      # open an SSH tunnel:  ssh -L 5432:127.0.0.1:5432 user@your-vps-ip
      - "127.0.0.1:5432:5432"

  server:
    build: ./server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Two proxies in front of the server: Caddy -> Nginx -> here.
      TRUST_PROXY_HOPS: 2
      DATABASE_URL: postgres://${POSTGRES_USER:-localeyes}:${POSTGRES_PASSWORD:-localeyes}@db:5432/${POSTGRES_DB:-localeyes}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # Same-origin via Caddy + the client's Nginx proxy, so this is the public URL.
      CORS_ORIGIN: ${CORS_ORIGIN}
      APP_URL: ${APP_URL}
      # Uploads: set STORAGE_DRIVER=r2 + R2_* in .env for a real deploy.
      # With the default local driver, files are written to /app/uploads,
      # persisted by the uploads-data volume below.
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - uploads-data:/app/uploads

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    # No host port: Caddy reaches it over the internal network as client:80.
    expose:
      - "80"

volumes:
  db-data:
  caddy-data:
  caddy-config:
  uploads-data:
