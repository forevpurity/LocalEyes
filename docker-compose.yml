# Production-style stack: Caddy (TLS) -> Nginx client -> Node server -> PostGIS.
# Copy .env.docker.example to .env and fill in real secrets before `docker compose up -d`.
# Every service loads its config from .env via `env_file`, so adding a new
# variable (e.g. an R2_* key) means editing .env only — not this file.
# The server crashes on boot (by design) if JWT secrets are weak/placeholder or
# CORS_ORIGIN is unset, since NODE_ENV=production here.
services:
  # Public front door: terminates TLS (auto Let's Encrypt) and forwards to client.
  # Reads DOMAIN / ACME_EMAIL from .env.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - client

  db:
    # PostGIS is preinstalled and the extension is auto-enabled on the default DB.
    # Reads POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB from .env.
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    env_file: .env
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-localeyes}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      # Bound to the VPS's localhost only: NOT reachable from the internet.
      # For db:push / db:seed, prefer the `tools` service below (runs on the VPS,
      # no tunnel). To use pgAdmin / psql from your laptop, open an SSH tunnel:
      #   ssh -L 5432:127.0.0.1:5432 user@your-vps-ip
      - "127.0.0.1:5432:5432"

  server:
    build: ./server
    restart: unless-stopped
    # App config (JWT_*, CORS_ORIGIN, APP_URL, STORAGE_DRIVER, R2_*) comes from .env.
    env_file: .env
    environment:
      # Fixed/computed values that aren't user config (these override .env):
      NODE_ENV: production
      PORT: 3000
      # Two proxies in front of the server: Caddy -> Nginx -> here.
      TRUST_PROXY_HOPS: 2
      # Assembled from the POSTGRES_* parts in .env; `db` is the compose network host.
      DATABASE_URL: postgres://${POSTGRES_USER:-localeyes}:${POSTGRES_PASSWORD:-localeyes}@db:5432/${POSTGRES_DB:-localeyes}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      # Persists local-driver uploads across rebuilds. Unused when STORAGE_DRIVER=r2.
      - uploads-data:/app/uploads

  client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - server
    # No host port: Caddy reaches it over the internal network as client:80.
    expose:
      - "80"

  # One-off DB admin tasks, run on the VPS without an SSH tunnel.
  # Built from the server's `build` stage, which (unlike the lean runtime image)
  # has the dev deps `db:push`/`db:seed` need — drizzle-kit, tsx — plus src/ and
  # drizzle.config.ts. The `tools` profile keeps it out of `docker compose up`;
  # it only runs when invoked explicitly:
  #   docker compose run --rm tools npm run db:push
  #   docker compose run --rm tools npm run db:seed
  tools:
    build:
      context: ./server
      target: build
    profiles: ["tools"]
    env_file: .env
    environment:
      # Same DB host as the server: `db` on the compose network.
      DATABASE_URL: postgres://${POSTGRES_USER:-localeyes}:${POSTGRES_PASSWORD:-localeyes}@db:5432/${POSTGRES_DB:-localeyes}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
  caddy-data:
  caddy-config:
  uploads-data:
