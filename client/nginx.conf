# Nginx config for the built client. Serves the static SPA and reverse-proxies
# the API, uploads, and Socket.io to the server container. Keeping the client
# and API same-origin is what lets the auth cookies stay sameSite=lax.

# Preserve the original protocol when a TLS-terminating proxy (Caddy) sits in
# front: forward its X-Forwarded-Proto (https) through to the server. Only fall
# back to this hop's $scheme when there's no upstream proxy (direct/local HTTP).
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow report/avatar uploads through: the server accepts up to
    # MAX_FILES(5) * MAX_FILE_SIZE(5MB) = ~25MB per request. Nginx's 1MB
    # default would otherwise reject multi-photo reports with 413.
    client_max_body_size 30m;

    # SPA routing: fall back to index.html for any non-asset path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API -> server container. The X-Forwarded-* headers are what the
    # server's `trust proxy` setting reads to set req.secure / the real client IP.
    # X-Forwarded-Proto uses $forwarded_proto (see the map above) so HTTPS set by
    # Caddy in front survives to the server and the `secure` cookie flag engages.
    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Uploaded images (only used by the local storage driver; with R2 the client
    # hits the bucket/CDN directly and this block is unused).
    location /uploads/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Socket.io needs the HTTP/1.1 connection-upgrade handshake for websockets.
    location /socket.io/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
