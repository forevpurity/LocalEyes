# Nginx config for the built client. Serves the static SPA and reverse-proxies
# the API, uploads, and Socket.io to the server container. Keeping the client
# and API same-origin is what lets the auth cookies stay sameSite=lax.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: fall back to index.html for any non-asset path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API -> server container. The X-Forwarded-* headers are what the
    # server's `trust proxy` setting reads to set req.secure / the real client IP.
    # NOTE: X-Forwarded-Proto is $scheme here (the proxy hop's scheme). When TLS
    # is terminated in FRONT of this Nginx, forward the original instead so the
    # `secure` cookie flag works end-to-end.
    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded images (only used by the local storage driver; with R2 the client
    # hits the bucket/CDN directly and this block is unused).
    location /uploads/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.io needs the HTTP/1.1 connection-upgrade handshake for websockets.
    location /socket.io/ {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
